<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>HTTP/3 Network Proxy</title>
</head>
<style>
    body { font-family: var(--vscode-font-family); padding: 20px; color: var(--vscode-editor-foreground); background-color: var(--vscode-editor-background); }
    h2 { border-bottom: 1px solid var(--vscode-panel-border); padding-bottom: 10px; }
    #status { margin-bottom: 20px; font-weight: bold; color: var(--vscode-terminal-ansiBrightGreen); }
    .user-list { list-style: none; padding: 0; }
    .user-item { display: flex; align-items: center; margin-bottom: 10px; font-size: 14px; padding: 8px; background: var(--vscode-editorWidget-background); border-radius: 4px; border: 1px solid var(--vscode-widget-border); }
    .color-dot { width: 12px; height: 12px; border-radius: 50%; margin-right: 10px; }
    .you-badge { margin-left: auto; font-size: 10px; background: var(--vscode-badge-background); color: var(--vscode-badge-foreground); padding: 2px 6px; border-radius: 10px; }
</style>
<body>
    <h2>🌐 HTTP/3 Session</h2>
    <div id="status">Waiting for connection...</div>
    
    <h3>Active Users</h3>
    <ul id="users" class="user-list">
        </ul>

    <script>
        const vscode = acquireVsCodeApi();
        let transport= null;
        let textStreamWriter = null;
        let datagramWriter = null;
        
        window.addEventListener('message', async event => {
            const message = event.data;
            if (message.type === 'connect') {
                await connectToRoom(message.roomId);
            } 
            else if (message.type === 'send-msg') {
                if(message.payload.type === 'doc' && textStreamWriter){
                    const myString = JSON.stringify({type:'doc', data: message.payload.data}) + '\n';
                    textStreamWriter.write(new TextEncoder().encode(myString));

                }else if(message.payload.type === 'awareness' && datagramWriter){
                    const data = new Uint8Array(message.payload.data);
                    datagramWriter.write(data);
                }
            }
            //Update the UI when users join/leave
            else if (message.type === 'update-users') {
                const usersList = document.getElementById('users');
                usersList.innerHTML = ''; // Clear current list
                
                message.users.forEach(u => {
                    const li = document.createElement('li');
                    li.className = 'user-item';
                    
                    const dot = document.createElement('div');
                    dot.className = 'color-dot';
                    dot.style.backgroundColor = u.color;
                    
                    const nameSpan = document.createElement('span');
                    nameSpan.textContent = u.name;
                    
                    li.appendChild(dot);
                    li.appendChild(nameSpan);
                    
                    if (u.isMe) {
                        const badge = document.createElement('span');
                        badge.className = 'you-badge';
                        badge.textContent = 'YOU';
                        li.appendChild(badge);
                    }
                    
                    usersList.appendChild(li);
                });
            }
        });

        async function connectToRoom(roomId) {
            try {
                const hashArray = new Uint8Array([ 27, 5, 168, 213, 109, 254, 75, 61, 64, 32, 165, 206, 94, 234,
                 167, 174, 139, 30, 160, 133, 143, 64, 123, 2, 223, 61, 28, 241, 34, 176, 179, 141]);
                
                transport = new WebTransport('https://127.0.0.1:4433/yjs-router', {
                    serverCertificateHashes: [{ algorithm: "sha-256", value: hashArray }]
                });
                
                await transport.ready;
                document.getElementById('status').textContent = `🟢 Connected to Room: ${roomId}`;
                vscode.postMessage({ type: 'status', message: `Connected! Joining ${roomId}...` });

                const textStream = await transport.createBidirectionalStream();
                textStreamWriter = textStream.writable.getWriter();
                const encoder = new TextEncoder();
                textStreamWriter.write(encoder.encode(roomId + '\n'));
                readReliableTextStream(textStream.readable);

                datagramWriter = transport.datagrams.writable.getWriter();
                readUnreliableDatagrams(transport.datagrams.readable);
            } catch (error) {
                vscode.postMessage({type:'status', message:'connection failed: ' + error.message});
            }
        }
         
        async function readReliableTextStream(readable){
            const reader = readable.getReader();
            const decoder = new TextDecoder();
            let buffer = '';
            try{
                while(true){
                    const {value, done} = await reader.read();
                    if(done)break;
                    buffer += decoder.decode(value, {stream:true});
                    const lines = buffer.split('\n');
                    buffer = lines.pop();
                    for(const line of lines){
                        if(!line)continue;
                        try{
                            const msg = JSON.parse(line);
                            vscode.postMessage({type:'incoming-msg', payload:msg});
                        }catch(e){
                            console.error("JSON Parse Error in proxy");
                        }
                    }

                }
            }catch(e){
                console.error('Text stream closed:', e);
            }
        }

        async function readUnreliableDatagrams(readable){
            const reader = readable.getReader();
            try{
                while(true){
                    const {value, done} = await reader.read();
                    if(done)break;
                    vscode.postMessage({type:'incoming-msg', payload:{type:'awareness', data:Array.from(value)}});
                }
            }catch(e){
                console.error('Datagram stream closed:', e);
            }
        }
               
    </script>
</body>
</html>
